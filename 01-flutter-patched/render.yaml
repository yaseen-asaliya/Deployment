services:
  # ── Flutter Web (Static Site) ──────────────────────────────────────────────
  - type: web
    name: al-saif-gallery
    env: static
    buildCommand: bash build.sh
    staticPublishPath: build/web
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-store, no-cache, must-revalidate
      - path: /flutter_service_worker.js
        name: Cache-Control
        value: no-store, no-cache, must-revalidate
      - path: /flutter.js
        name: Cache-Control
        value: no-store, no-cache, must-revalidate
      - path: /flutter_bootstrap.js
        name: Cache-Control
        value: no-cache
      - path: /manifest.json
        name: Cache-Control
        value: public, max-age=3600
      - path: /main.dart.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /icons/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /canvaskit/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
